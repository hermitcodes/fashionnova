{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Verify Code - FashionNova{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-shield-alt me-2"></i>Verify Code</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted mb-2">A 6-digit code was sent to:</p>
                    <p><strong>{{ email }}</strong></p>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.code|as_crispy_field }}
                        <div class="d-grid mt-3">
                            <button type="submit" class="btn btn-primary">Verify Code</button>
                        </div>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="{% url 'forgot_password' %}" class="text-decoration-none">Use another email</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
