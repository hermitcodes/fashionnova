{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Forgot Password - FashionNova{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-key me-2"></i>Forgot Password</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted">Enter your account email to receive a verification code.</p>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.email|as_crispy_field }}
                        <div class="d-grid mt-3">
                            <button type="submit" class="btn btn-primary">Send Code</button>
                        </div>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="{% url 'login' %}" class="text-decoration-none">Back to login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
